<button
  class="btn btn--ghost"
  type="button"
  {% if user.is_authenticated %}
    data-action="modal"
    data-url="{% url 'locations:manage_visits_location' location.slug %}"
    data-title="{% translate 'visits to'|capfirst %} {{ location.name }}"
    data-on-close-url="{% url 'cmnsd:dispatch_field_of_object_by_id_and_slug' 'location' location.id location.slug 'topactions' %}"
    data-on-close-map='{"topactions": "#topactions"}'
  {% else %}
    data-bs-toggle="popover" 
    data-bs-title="{% translate 'login or register'|capfirst %}" 
    data-bs-content="{% blocktranslate %}You need an account to visit this location. Please login or register.{% endblocktranslate %}"
  {% endif %}
  >{% include 'field/location/visitors.html' %}</button>
